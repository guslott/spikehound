name: Build and Release

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-installers:
    strategy:
      matrix:
        include:
          - os: macos-latest
            runner: macos-latest
            # Mac-specific variables
            upload_path: dist/SpikeHound-Mac-Installer.dmg
            asset_name: SpikeHound-Mac-Installer.dmg
            content_type: application/x-apple-diskimage
          - os: windows-latest
            runner: windows-latest
            # Windows-specific variables
            upload_path: dist/SpikeHound-Windows-Installer.exe
            asset_name: SpikeHound-Windows-Installer.exe
            content_type: application/vnd.microsoft.portable-executable
          - os: ubuntu-22.04
            runner: ubuntu-22.04
            deb_arch: amd64
            upload_path: dist/SpikeHound-Linux-Installer-amd64.deb
            asset_name: SpikeHound-Linux-Installer-amd64.deb
            content_type: application/vnd.debian.binary-package
          - os: ubuntu-22.04-arm
            runner: ubuntu-22.04-arm
            deb_arch: arm64
            upload_path: dist/SpikeHound-Linux-Installer-arm64.deb
            asset_name: SpikeHound-Linux-Installer-arm64.deb
            content_type: application/vnd.debian.binary-package

    runs-on: ${{ matrix.runner }}

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12' 
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Install Linux packaging tools
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          dpkg-dev \
          file \
          libegl1 \
          libwebp7 \
          libxcb-cursor0 \
          libxcb-icccm4 \
          libxcb-image0 \
          libxcb-keysyms1 \
          libxcb-render-util0 \
          libxcb-shape0 \
          libxcb-util1 \
          libxcb-xkb1 \
          libxkbcommon-x11-0

    # --- MAC SPECIFIC SETUP ---
    - name: Install Mac Tools
      if: runner.os == 'macOS'
      run: brew install create-dmg

    # --- BUILD APPLICATION ---
    - name: Build with PyInstaller
      run: pyinstaller --clean --noconfirm SpikeHound.spec

    # --- LINUX PACKAGING (DEB) ---
    - name: Build Linux DEB
      if: runner.os == 'Linux'
      shell: bash
      run: |
        set -euo pipefail

        PKG_ROOT="packaging/deb/root"
        rm -rf "$PKG_ROOT"

        mkdir -p "$PKG_ROOT/DEBIAN"
        mkdir -p "$PKG_ROOT/opt/spikehound"
        mkdir -p "$PKG_ROOT/usr/bin"
        mkdir -p "$PKG_ROOT/usr/share/applications"
        mkdir -p "$PKG_ROOT/usr/share/icons/hicolor/512x512/apps"

        cp -R dist/SpikeHound/. "$PKG_ROOT/opt/spikehound/"
        cp media/icon.png "$PKG_ROOT/usr/share/icons/hicolor/512x512/apps/spikehound.png"

        # Qt's optional WebP image plugin can be linked against an older libwebp ABI
        # than Ubuntu 22.04 provides on arm64. SpikeHound does not rely on WebP support.
        rm -f "$PKG_ROOT/opt/spikehound/_internal/PySide6/Qt/plugins/imageformats/libqwebp.so"

        cat > "$PKG_ROOT/usr/bin/spikehound" << 'EOF'
        #!/usr/bin/env bash
        exec /opt/spikehound/SpikeHound "$@"
        EOF
        chmod 0755 "$PKG_ROOT/usr/bin/spikehound"

        cat > "$PKG_ROOT/usr/share/applications/spikehound.desktop" << 'EOF'
        [Desktop Entry]
        Name=SpikeHound
        Comment=Real-time neurophysiology software for education and research
        Exec=spikehound
        Icon=spikehound
        Terminal=false
        Type=Application
        Categories=Education;Science;
        EOF

        DEB_VERSION="0.0.${GITHUB_RUN_NUMBER}"

        mkdir -p debian
        cat > debian/control << EOF
        Source: spikehound
        Section: science
        Priority: optional
        Maintainer: SpikeHound Maintainers
        Standards-Version: 4.6.0

        Package: spikehound
        Architecture: ${{ matrix.deb_arch || 'all' }}
        Description: SpikeHound real-time neurophysiology app
         Real-time bioelectric data acquisition, visualization, and analysis.
        EOF

        mapfile -t ELF_FILES < <(
          find "$PKG_ROOT/opt/spikehound" -type f -print0 \
            | xargs -0 file \
            | awk -F: '/ELF/{print $1}'
        )

        SHLIB_DEPS=""
        if ((${#ELF_FILES[@]} > 0)); then
          SHLIB_DEPS="$(
            dpkg-shlibdeps \
              -O \
              -l"$PKG_ROOT/opt/spikehound" \
              -l"$PKG_ROOT/opt/spikehound/_internal" \
              "${ELF_FILES[@]}" \
            | sed -n 's/^shlibs:Depends=//p'
          )"
        fi

        if [[ -n "$SHLIB_DEPS" ]]; then
          DEPENDS_LINE="Depends: ${SHLIB_DEPS}, libasound2"
        else
          DEPENDS_LINE="Depends: libasound2"
        fi

        cat > "$PKG_ROOT/DEBIAN/control" << EOF
        Package: spikehound
        Version: ${DEB_VERSION}
        Section: science
        Priority: optional
        Architecture: ${{ matrix.deb_arch || 'all' }}
        Maintainer: SpikeHound Maintainers
        ${DEPENDS_LINE}
        Description: SpikeHound real-time neurophysiology app
         Real-time bioelectric data acquisition, visualization, and analysis.
        EOF

        chmod 0644 "$PKG_ROOT/DEBIAN/control"
        dpkg-deb --build "$PKG_ROOT" "${{ matrix.upload_path }}"

    # --- WINDOWS PACKAGING (Inno Setup) ---
    - name: Install Inno Setup
      if: runner.os == 'Windows'
      shell: pwsh
      run: choco install innosetup --no-progress -y

    - name: Build Windows Installer
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
        if (-not (Test-Path $iscc)) {
          throw "ISCC.exe not found at $iscc"
        }
        & $iscc "setup.iss"

    # --- MAC PACKAGING (DMG) ---
    - name: Build Mac DMG
      if: runner.os == 'macOS'
      run: |
        # Clean up any previous attempts
        rm -f dist/SpikeHound-Mac-Installer.dmg
        
        # Create the DMG
        create-dmg \
          --volname "SpikeHound Installer" \
          --volicon "media/SpikeHound.icns" \
          --window-pos 200 120 \
          --window-size 600 400 \
          --icon-size 128 \
          --icon "SpikeHound.app" 150 200 \
          --app-drop-link 450 200 \
          "dist/SpikeHound-Mac-Installer.dmg" \
          "dist/SpikeHound.app"

    # --- UPLOAD FINAL INSTALLER ---
    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v6
      with:
        name: ${{ matrix.asset_name }}
        path: ${{ matrix.upload_path }}
